<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="숏폼3기 수강생 진도율과 수익 인증을 함께 확인하세요." />
  <title>숏폼3기 수강생 리더보드</title>
  <link rel="stylesheet" href="/style.css?v=3" />
</head>
<body>
  <div class="stars" id="stars"></div>

  <header class="header">
    <div class="header-inner">
      <h1>숏폼3기 수강생 리더보드</h1>
    </div>
    <div class="meta-bar">
      <span id="last-updated">데이터 로딩 중...</span>
      <button id="refresh-btn" class="refresh-btn" onclick="loadLeaderboard(true)">
        <span class="refresh-icon">↻</span> 새로고침
      </button>
      <a class="admin-link" href="/admin">관리자 페이지</a>
    </div>
  </header>

  <main class="main">
    <section class="podium-section" id="podium-section">
      <div class="podium-wrapper" id="podium"></div>
    </section>

    <section class="table-section">
      <div class="table-header-row">
        <span class="th rank-col">#</span>
        <span class="th name-col">이름</span>
        <span class="th river-col">진도율</span>
        <span class="th level-col">오리 레벨</span>
        <span class="th score-col">진도 점수</span>
      </div>
      <div id="leaderboard-list" class="leaderboard-list">
        <div class="loading">
          <div class="duck-loading"><img src="/sparta4.png" alt="스파르탄 로딩" /></div>
          <p>데이터를 불러오는 중...</p>
        </div>
      </div>
    </section>
  </main>

  <div id="student-modal-overlay" class="modal-overlay" style="display:none;">
    <div id="student-modal" class="modal-card">
      <button id="student-modal-close" class="modal-close" aria-label="닫기">✕</button>
      <div class="modal-header">
        <h2 id="student-modal-title">학생 인증 현황</h2>
        <p id="student-modal-subtitle" class="field-note">이름을 클릭하면 모달로 나의 인증 현황을 확인할 수 있습니다.</p>
      </div>
      <div id="student-modal-login" class="section-card">
        <h3>본인 인증</h3>
        <p class="field-note">리대시 생년월일 마지막 4자리로 로그인하세요.</p>
        <form id="student-modal-login-form" class="form-grid">
          <label>
            생년월일 4자리
            <input name="code" id="student-modal-code" class="text-input" type="text" maxlength="4" pattern="\d{4}" inputmode="numeric" required placeholder="MMDD 또는 YYYY 마지막 4자리" />
          </label>
          <button type="submit" class="primary-btn">로그인</button>
        </form>
        <p id="student-modal-login-message" class="field-note"></p>
      </div>
      <div id="student-modal-content" class="modal-content" style="display:none;">
        <div class="section-card">
          <h3>나의 인증 현황</h3>
          <div id="student-modal-summary" class="summary-grid">
            <div><strong>진도율</strong><p id="student-modal-progress">-</p></div>
            <div><strong>오리 레벨</strong><p id="student-modal-level">-</p></div>
            <div><strong>진도 점수</strong><p id="student-modal-progress-score">-</p></div>
            <div><strong>수익 인증 합계</strong><p id="student-modal-revenue-total">-</p></div>
          </div>
          <div id="student-modal-river" class="river-wrap" style="margin-top:1rem;"></div>
        </div>
        <div class="section-card">
          <h3>수익 현황</h3>
          <div id="student-modal-revenue-status" class="summary-grid">
            <div><strong>수익 점수</strong><p id="student-modal-revenue-score">-</p></div>
            <div><strong>승인된 미션</strong><p id="student-modal-approved-missions">-</p></div>
            <div><strong>승인된 주차</strong><p id="student-modal-approved-weeks">-</p></div>
          </div>
        </div>
        <div class="section-card">
          <h3>미션 목록</h3>
          <div id="student-modal-mission-list" class="mission-list"><p class="field-note">정보를 불러오는 중...</p></div>
        </div>
        <div class="section-card">
          <h3>수익 제출</h3>
          <form id="student-modal-revenue-form" class="form-grid">
            <input type="hidden" name="studentName" id="student-modal-name" />
            <label>
              금액
              <input name="amount" class="text-input" type="number" min="0" placeholder="원" required />
            </label>
            <label>
              영수증 첨부
              <input name="receipt" class="file-input" type="file" accept="image/*" />
            </label>
            <button type="submit" class="primary-btn">수익 인증 제출</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
