<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생 페이지</title>
  <link rel="stylesheet" href="/style.css?v=3" />
</head>
<body>
  <div class="stars" id="stars"></div>
  <header class="header">
    <div class="header-inner">
      <div class="title-group">
        <span class="crown">🎓</span>
        <h1 id="student-name">학생 페이지</h1>
        <span class="crown">🎓</span>
      </div>
      <p class="subtitle">수강생 개인 진도율, 미션, 수익 인증 현황을 확인하세요.</p>
    </div>
    <div class="meta-bar">
      <a class="admin-link" href="/">메인 페이지로</a>
    </div>
  </header>

  <main class="main">
    <section id="student-login" class="section-card">
      <h2>학생 본인 인증</h2>
      <p class="field-note">생년월일 마지막 4자리로 로그인하세요.</p>
      <form id="student-login-form" class="form-grid">
        <label>
          생년월일 4자리
          <input name="code" id="student-login-code" class="text-input" type="text" maxlength="4" pattern="\d{4}" inputmode="numeric" required placeholder="MMDD" />
        </label>
        <button type="submit" class="primary-btn">로그인</button>
      </form>
      <p id="student-login-message" class="field-note"></p>
    </section>

    <div id="student-content" style="display:none;">
      <section class="section-card">
        <h2>내 진도율</h2>
        <div id="progress-summary" class="summary-grid">
          <div><strong>진도율</strong><p id="student-progress">-</p></div>
          <div><strong>레벨</strong><p id="student-level">-</p></div>
          <div><strong>진도 점수</strong><p id="student-progress-score">-</p></div>
          <div><strong>미션 승인 주차</strong><p id="student-mission-week">-</p></div>
        </div>
      <div class="progress-bar" id="student-progress-bar"><span class="progress-fill" style="width:0%"></span></div>
      <p id="student-db-status" class="field-note"></p>
    </section>

    <section class="section-card">
      <h2>내 인증 현황</h2>
      <div id="student-auth-summary" class="summary-grid">
        <div><strong>승인된 미션</strong><p id="student-approved-missions">-</p></div>
        <div><strong>승인된 주차</strong><p id="student-approved-weeks">-</p></div>
        <div><strong>수익 인증 합계</strong><p id="student-revenue-total">-</p></div>
        <div><strong>수익 레벨</strong><p id="student-revenue-level">-</p></div>
      </div>
    </section>

    <section class="section-card">
      <h2>주차별 미션</h2>
      <div id="student-mission-list" class="mission-list">
        <p class="field-note">미션 정보를 불러오는 중...</p>
      </div>
    </section>

    <section class="section-card">
      <h2>미션 제출</h2>
      <form id="student-mission-form" class="form-grid">
        <input type="hidden" name="studentName" id="studentNameInput" />
        <label>
          미션 선택
          <select name="missionId" class="text-input" required>
            <option value="">미션을 선택하세요</option>
          </select>
        </label>
        <label>
          설명
          <textarea name="notes" class="textarea" placeholder="미션 진행 내용을 입력하세요"></textarea>
        </label>
        <label>
          증빙 이미지
          <input name="receipt" class="file-input" type="file" accept="image/*" />
        </label>
        <button type="submit" class="primary-btn">미션 제출</button>
      </form>
    </section>

    <section class="section-card">
      <h2>수익 인증 제출</h2>
      <form id="student-revenue-form" class="form-grid">
        <input type="hidden" name="studentName" id="studentNameInput2" />
        <label>
          금액
          <input name="amount" class="text-input" type="number" min="0" placeholder="원" required />
        </label>
        <label>
          영수증 첨부
          <input name="receipt" class="file-input" type="file" accept="image/*" />
        </label>
        <button type="submit" class="primary-btn">제출하기</button>
      </form>
    </section>

    <section class="section-card">
      <h2>내 제출 현황</h2>
      <div class="section-grid">
        <section class="section-card">
          <h3>미션 제출</h3>
          <div id="student-mission-submissions" class="submission-list">
            <p class="field-note">미션 제출 내역을 불러오는 중...</p>
          </div>
        </section>
        <section class="section-card">
          <h3>수익 제출</h3>
          <div id="student-revenue-submissions" class="submission-list">
            <p class="field-note">수익 제출 내역을 불러오는 중...</p>
          </div>
        </section>
      </div>
    </section>
  </div>
  </main>

  <script src="/student.js"></script>
</body>
</html>
